<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Faruk's Movie Zone</title>
  <style>
    /* Reset & Typography */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SolaimanLipi', 'Hind Siliguri', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      color: #333;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background-color: #1a1a1a;
      padding: 15px 20px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .navbar a {
      color: #e0e0e0;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 20px;
      transition: 0.3s;
    }

    .navbar a:hover, .navbar a.active {
      background-color: #ffcc00;
      color: #1a1a1a;
    }

    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 100%;
      max-width: 1000px;
    }

    h2 { font-size: 32px; margin-bottom: 30px; }

    .video-wrapper {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background-color: #000; 
      position: relative;
      aspect-ratio: 16 / 9;
    }

    /* Target the new Google Drive Iframe */
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Playlist Styles */
    .playlist-container {
      margin-top: 30px;
      text-align: left;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
    }

    .playlist {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 250px;
      overflow-y: auto;
    }

    .playlist-item {
      padding: 12px 15px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .playlist-item.playing {
      background: #0077cc;
      color: #fff;
    }

    @media (max-width: 600px) {
      .container { padding: 20px 15px; }
      h2 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <a href="https://faruk90scinet.github.io/movie/">Channel 1</a>
    <a href="https://faruk90scinet.github.io/movie/2">Channel 2</a>
    <a href="https://faruk90scinet.github.io/movie/3">Channel 3</a>
    <a href="https://faruk90scinet.github.io/movie/4">Channel 4</a>
    <a href="https://faruk90scinet.github.io/movie/5">জলসা</a>
  </header>

  <main class="main">
    <div class="container">
      <h2 id="current-video-title">Loading..</h2>

      <div class="video-wrapper">
        <iframe id="main-player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>

      <div class="playlist-container">
        <div class="playlist" id="playlist"></div>
      </div>
    </div>
  </main>

  <footer class="navbar">
    <a href="https://faruk90scinet.github.io/movie/">Channel 1</a>
    <a href="https://faruk90scinet.github.io/movie/2">Channel 2</a>
    <a href="https://faruk90scinet.github.io/movie/3">Channel 3</a>
    <a href="https://faruk90scinet.github.io/movie/4">Channel 4</a>
    <a href="https://faruk90scinet.github.io/movie/5">জলসা</a>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // 1. Navbar Active Link Logic
      const currentUrl = window.location.href.split('?')[0].replace(/\/$/, "");
      document.querySelectorAll(".navbar a").forEach(link => {
        const linkUrl = link.href.split('?')[0].replace(/\/$/, "");
        if (linkUrl === currentUrl) {
          link.classList.add("active");
        }
      });

      // 2. Video Data Array
      // Using the /preview link structure lets Google's native player handle playback cleanly.
      const videoList = [
        { 
          title: "DRSM-3", 
          src: "https://drive.google.com/file/d/1E0VgL2UaOyXxiQtyNZqPUjZUA3LD3hdt/preview"
        },
        { 
          title: "HDLN", 
          src: "https://drive.google.com/file/d/14va-WHbFVbpGmHqfcFYPkwqe5DkiP0TP/preview"
        }
      ];

      const player = document.getElementById("main-player");
      const titleDisplay = document.getElementById("current-video-title");
      const playlistContainer = document.getElementById("playlist");

      // 3. Load Video Function
      function loadVideo(index) {
        const video = videoList[index];
        
        // Point the iframe to Google's specialized stream player
        player.src = video.src;

        titleDisplay.innerText = "🎬 " + video.title;

        // UI Playlist Item Update
        document.querySelectorAll('.playlist-item').forEach((item, idx) => {
          item.classList.toggle('playing', idx === index);
        });
      }

      // 4. Generate Playlist
      videoList.forEach((video, index) => {
        const item = document.createElement('div');
        item.className = 'playlist-item';
        item.innerText = video.title;
        item.onclick = () => loadVideo(index);
        playlistContainer.appendChild(item);
      });

      // 5. Initial Load (First video)
      loadVideo(0);
    });
  </script>
</body>
</html>
