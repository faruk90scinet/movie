<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Faruk's Movie Zone</title>
  <style>
    /* Reset & Typography */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'SolaimanLipi', 'Hind Siliguri', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      color: #333;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background-color: #1a1a1a;
      padding: 15px 20px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .navbar a {
      color: #e0e0e0;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 20px;
      transition: 0.3s;
    }

    .navbar a:hover, .navbar a.active {
      background-color: #ffcc00;
      color: #1a1a1a;
    }

    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 100%;
      max-width: 1000px;
    }

    h2 { font-size: 32px; margin-bottom: 30px; }

    .video-wrapper {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      background-color: #000; 
    }

    video { width: 100%; aspect-ratio: 16 / 9; display: block; }

    /* Subtitle Customization */
    video::cue {
      background-color: rgba(0, 0, 0, 0.8);
      color: #ffffff;
      font-size: 1.2rem;
    }

    /* Playlist Styles */
    .playlist-container {
      margin-top: 30px;
      text-align: left;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
    }

    .playlist {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 250px;
      overflow-y: auto;
    }

    .playlist-item {
      padding: 12px 15px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .playlist-item.playing {
      background: #0077cc;
      color: #fff;
    }

    @media (max-width: 600px) {
      .container { padding: 20px 15px; }
      h2 { font-size: 24px; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <a href="https://faruk90scinet.github.io/movie/">Channel 1</a>
    <a href="https://faruk90scinet.github.io/movie/2">Channel 2</a>
    <a href="https://faruk90scinet.github.io/movie/3">Channel 3</a>
    <a href="https://faruk90scinet.github.io/movie/4">Channel 4</a>
    <a href="https://faruk90scinet.github.io/movie/5">জলসা</a>
  </header>

  <main class="main">
    <div class="container">
      <h2 id="current-video-title">Loading...</h2>

      <div class="video-wrapper">
        <video id="main-player" controls crossorigin="anonymous">
          Your browser does not support the video tag.
        </video>
      </div>

      <div class="playlist-container">
        <div class="playlist" id="playlist"></div>
      </div>
    </div>
  </main>

  <footer class="navbar">
    <a href="https://faruk90scinet.github.io/movie/">Channel 1</a>
    <a href="https://faruk90scinet.github.io/movie/2">Channel 2</a>
    <a href="https://faruk90scinet.github.io/movie/3">Channel 3</a>
    <a href="https://faruk90scinet.github.io/movie/4">Channel 4</a>
    <a href="https://faruk90scinet.github.io/movie/5">জলসা</a>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // 1. Navbar Active Link Logic
      const currentUrl = window.location.href.split('?')[0].replace(/\/$/, "");
      document.querySelectorAll(".navbar a").forEach(link => {
        const linkUrl = link.href.split('?')[0].replace(/\/$/, "");
        if (linkUrl === currentUrl) {
          link.classList.add("active");
        }
      });

      // 2. Video Data with Subtitles
      const videoList = [
        { 
          title: "BCP8188", 
          src: "https://dl.dropboxusercontent.com/scl/fi/wx5e056loxywtzdo7bjm1/bcp8188.mkv?rlkey=3jp3d200531u7hsafk3itbexi",
          subtitle: "mamla-1.vtt" 
        },
        { 
          title: "Mamla LGL Hi - Episode-02", 
          src: "https://dl.dropboxusercontent.com/scl/fi/p2is71p121znpkiuyu1ki/MLH-2.mp4?rlkey=xeh69gq1hqntrgvscvb925yr2",
          subtitle: "mamla-2.vtt" 
        },
        { 
          title: "Mamla LGL Hi - Episode-03", 
          src: "https://dl.dropboxusercontent.com/scl/fi/wv7uy9nxs61lifgeltlgm/MLH-3.mp4?rlkey=8nlh66fk3fi4g921sdqd9kz31",
          subtitle: "mamla-3.vtt" 
        },
        { 
          title: "Mamla LGL Hi - Episode-04", 
          src: "https://dl.dropboxusercontent.com/scl/fi/x21l40e9qm7vck4n9lf4y/MLH-4.mp4?rlkey=hktc3caatkd8rjfk62ki8079f",
          subtitle: "mamla-4.vtt" 
        },
        { 
          title: "Mamla LGL Hi - Episode-05", 
          src: "https://dl.dropboxusercontent.com/scl/fi/v1msqbi86xw7xdspyreah/MLH-5.mp4?rlkey=jycoro2u93agafizmj8662ee9",
          subtitle: "mamla-5.vtt" 
        },
        { 
          title: "Mamla LGL Hi - Episode-06", 
          src: "https://dl.dropboxusercontent.com/scl/fi/uygq4xo3l1mqddmvjpvzu/MLH-6.mp4?rlkey=n4dwdg5mrlx1362dzmusgqqqr",
          subtitle: "mamla-6.vtt" 
        },
        { 
          title: "Mamla LGL Hi - Episode-07", 
          src: "https://dl.dropboxusercontent.com/scl/fi/u6e693q58g49ky91qb28e/MLH-7.mp4?rlkey=g1tkl3q7ytssyigfgm6krwin6",
          subtitle: "mamla-7.vtt" 
        },
        { 
          title: "Mamla LGL Hi - Episode-08", 
          src: "https://dl.dropboxusercontent.com/scl/fi/fpg6i9vaq770mj7inxil0/MLH-8.mp4?rlkey=963ji5ogwd7qgrgjc0esdljol",
          subtitle: "mamla-8.vtt" 
        }
      ];

      const player = document.getElementById("main-player");
      const titleDisplay = document.getElementById("current-video-title");
      const playlistContainer = document.getElementById("playlist");

      // 3. Load Video Function
      function loadVideo(index, autoPlay = true) {
        const video = videoList[index];
        
        // Remove old tracks
        while (player.firstChild) {
          player.removeChild(player.firstChild);
        }

        // Set Video Source
        player.src = video.src;

        // Create and Add Subtitle Track
        if (video.subtitle) {
          const track = document.createElement("track");
          track.kind = "subtitles";
          track.label = "Bengali";
          track.srclang = "bn";
          track.src = video.subtitle;
          track.default = true; // Auto-enable subtitles
          player.appendChild(track);
        }

        titleDisplay.innerText = "🎬 " + video.title;

        // UI Update
        document.querySelectorAll('.playlist-item').forEach((item, idx) => {
          item.classList.toggle('playing', idx === index);
        });

        if (autoPlay) player.play();
      }

      // 4. Generate Playlist
      videoList.forEach((video, index) => {
        const item = document.createElement('div');
        item.className = 'playlist-item';
        item.innerText = video.title;
        item.onclick = () => loadVideo(index);
        playlistContainer.appendChild(item);
      });

      // 5. Initial Load (First video, no autoplay)
      loadVideo(0, false);

      // 6. Auto-play Next
      player.onended = () => {
        let nextIndex = videoList.findIndex(v => v.src === player.src) + 1;
        if (nextIndex < videoList.length) loadVideo(nextIndex);
      };
    });
  </script>
</body>
</html>
